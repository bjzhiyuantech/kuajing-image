services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gpt_image_canvas}
      MYSQL_USER: ${MYSQL_USER:-gpt_image_canvas}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gpt_image_canvas}
    expose:
      - "3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  app-blue:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:23-bullseye-slim}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
        APT_MIRROR: ${APT_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      DATA_DIR: /app/data
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-gpt_image_canvas}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gpt_image_canvas}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gpt_image_canvas}
      DEPLOY_COLOR: blue
    expose:
      - "8787"
    ports:
      - "127.0.0.1:${BLUE_PORT:-8788}:8787"
    volumes:
      - ./data:/app/data
      - ./downloads:/app/apps/web/dist/downloads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8787/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  app-green:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:23-bullseye-slim}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
        APT_MIRROR: ${APT_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      DATA_DIR: /app/data
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-gpt_image_canvas}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gpt_image_canvas}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gpt_image_canvas}
      DEPLOY_COLOR: green
    expose:
      - "8787"
    ports:
      - "127.0.0.1:${GREEN_PORT:-8789}:8787"
    volumes:
      - ./data:/app/data
      - ./downloads:/app/apps/web/dist/downloads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8787/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${PUBLIC_PORT:-8787}:80"
      - "${DEV_PUBLIC_PORT:-8790}:81"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/active-upstream.conf:/etc/nginx/conf.d/active-upstream.conf:ro
      - ./deploy/nginx/dev-upstream.conf:/etc/nginx/conf.d/dev-upstream.conf:ro
    depends_on:
      app-blue:
        condition: service_healthy
      app-green:
        condition: service_healthy

volumes:
  mysql-data:
